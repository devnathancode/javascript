<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>invertendo string</title>
</head>
<body>
    <script>
        let string = 'nathan';
        let inverter = '';

        for(let i = string.length -1;i >= 0; i--) {
            inverter += string[i]
        }
        console.log(inverter)



    </script>
</body>
</html>
